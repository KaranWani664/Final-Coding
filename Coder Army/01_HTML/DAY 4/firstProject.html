<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> University Registration Form</h1>
    <p>Please fill out the form below to register.</p>

    <hr /> 
    <form>
        <h2> Personal Details</h2>

        <label for="firstName"> First Name: </label>
        <input type = "text" id="firstName" name="firstName" placeholder="e.g. Karan">
        <br />
        <br />
        <!-- Required / * Marked -->
        <label for="firstName"> First Name: </label>
        <input type = "text" id="firstName" name="firstName" placeholder="e.g. Karan" required>
        <br />
        <br />
        <label for="lastName"> Last Name: </label>
        <input type = "text" id="lastName" name="lastName" placeholder="e.g. Wani">
        <br />
        <br />
        <label for="dateOfBirth"> Date of Birth: </label>
        <input type = "date" id="dateOfBirth" name="dateOfBirth">
        
        <br />
        <br />
        
        <label>Gender: </label>
        <br />
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <br />
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <br />
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label>

        <br />
        <br />

        <label>Upload your photo:</label>
        <br />
        <input type = "file" name="photo" value="Upload Photo" accept="image/*">

        <!-- Name & Value is for Server Pushed Data -->
        <!-- for & id is just for tagging  -->
        <br /> 
        <br />
        <hr />

        <h2>Contact Information</h2>

        <label for = "emailAddress">Email Address:</label>
        <input type = "email" id="emailAddress" placeholder="you@example.com" name="emailAddress">
        
        <br />
        <br />

        <label for = "phoneNumber">Phone Number:</label>
        <input type = "tel" id="phoneNumber" name="phoneNumber" placeholder="e.g. +91 1234567890"> 

        <br />
        <br />
        <label for = "address">Mailing Address:</label>
        <br />
        <textarea id="address" name="address" placeholder="Enter your full address" rows="10" cols="50"></textarea> 
        <br />
        <br />

        <hr />

        <h2>Academic Information</h2>

        <label for="currentCourse">Select Your Course: </label>
        <br />
        <!-- Drop Down -->
        <select id = "currentCourse" name="currentCourse"> 
            <option value="CSE">Computer Science Engineering</option>
            <option value="IT">Information Technology</option>
            <option value="ECE">Electronics and Communication Engineering</option>
            <option value="ME">Mechanical Engineering</option>
        </select>

        <br />
        <br />

        <label>ExtraCurricular Activities:</label>
        <input type="checkbox" id="sports" name="extraCurricular" value="Sports">
        <label for="sports">Sports</label>

        <input type="checkbox" id="musicAndArts" name="extraCurricular" value="MusicAndArts">
        <label for="musicAndArts">Music & Arts</label>
        
        <input type="checkbox" id="technologyClubs" name="extraCurricular" value="Technology Clubs">
        <label for="technologyClubs">Technology Clubs</label>

        <input type = "checkbox" id="Volunteering" name = "extraCurricular" value="Volunteering">
        <label for="Volunteering">Volunteering</label>

        <br />
        <hr />

        <h2>Create Your Account</h2>
        <label for = "password">Create a password: </label>
        <input type="password" id="password" name="password" placeholder="Enter your password here">

        <br />
        <br />

        <label for="securityQuestion">Security Question:</label>
        <select id="securityQuestion">
            <option value = "petName">What is your pet's name?</option>
            <option value = "motherName">What is your mother's name?</option>
            <option value = "firstSchool">What was the name of your first school?</option>
        </select>

        <br />
        <br />

        <label for = "securityAnswer">Security Answer:</label>
        <input type = "text" id="securityAnswer" name="securityAnswer" placeholder="Enter your security answer here">

        <br />
        <br />

        <input type="checkbox" id="terms" name="terms" value="agreedTerms">
        <label for="terms">I agree to the terms and conditions</label>

        <br />
        <br />
        
        <br />
        <br />
        <hr />
        <!-- New Method -->
        <button type="submit">Register</button>
        <button type="reset">Reset/Clear Form</button>

        <hr />
        <!-- Older Method -->
        <input type = "submit" value="Register">

        <!-- HW -> why don't we use <input> (Older Method) to submit forms nowadays  -->



        
    </form>
</body>
</html>
