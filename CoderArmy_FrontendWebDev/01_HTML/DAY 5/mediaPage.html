<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>This is our Media Website</h1>
    <!-- Old Method -->
    <audio src="wavy.mp3" controls></audio>
    <br />
    <video src="rohit.mp4" controls height="300px"></video>
    <hr />
    <!-- New Method -->
    <!-- Search HTML Audio in Browser -->

    <audio controls>
        <source src="./wavy.mp3" type="audio/mp3">
        your browser does not support the audio tag
    </audio>
    <br />
    <video controls width="500px">
        <source src="./rohit.mp4" type="video/mp4">
        your browser does not support the video tag
    </video>
    <hr />

    <!-- YouTube Video -->
    <iframe src="https://www.youtube.com/embed/NGYp1zCBthk" allowfullscreen></iframe>
    <iframe src="https://youtube.com/embed/NGYp1zCBthk?si=Yn79PLCZaWgYsTK_" allowfullscreen></iframe>

</body>
</html>
